<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>حذف الحساب - تطبيق القلعة</title>
    <!-- reCAPTCHA v3 -->
    <script src="https://www.google.com/recaptcha/api.js?render=YOUR_SITE_KEY"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', 'Roboto', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            padding: 28px 24px;
            text-align: center;
            color: white;
        }

        .header .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 800;
        }

        .content {
            padding: 28px 24px;
        }

        .warning-box {
            background: #fef3c7;
            border-right: 4px solid #f59e0b;
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #92400e;
        }

        .info-box {
            background: #e0f2fe;
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #075985;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #334155;
            font-size: 14px;
        }

        .required {
            color: #ef4444;
            margin-right: 4px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.2s;
            background: #f8fafc;
            direction: ltr;
        }

        input:focus {
            outline: none;
            border-color: #dc2626;
            background: white;
            box-shadow: 0 0 0 3px rgba(220,38,38,0.1);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            color: white;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
            margin-top: 8px;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(220,38,38,0.4);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result {
            margin-top: 20px;
            padding: 14px;
            border-radius: 14px;
            display: none;
            text-align: center;
            font-weight: 500;
            font-size: 14px;
        }

        .result.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }

        .result.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
            font-size: 12px;
            color: #94a3b8;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .rate-limit-warning {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 12px;
            margin-top: 16px;
            font-size: 12px;
            color: #991b1b;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <div class="icon">⚠️🗑️</div>
            <h1>حذف الحساب بشكل نهائي</h1>
        </div>

        <div class="content">
            <div class="warning-box">
                ⚠️ <strong>تنبيه:</strong> حذف الحساب نهائي ولا يمكن التراجع عنه. سيتم حذف جميع بياناتك.
            </div>

            <div class="info-box">
                <span>🔐🛡️</span>
                <span>نظام الحماية: reCAPTCHA + تحديد عدد المحاولات (5 محاولات لكل 15 دقيقة)</span>
            </div>

            <form id="deleteForm">
               

                <div class="form-group">
                    <label>رقم الهاتف <span class="required">*</span></label>
                    <input type="tel" id="phone" placeholder="9647888705002" dir="ltr" required>
                </div>

                <div class="form-group">
                    <label>🔐 كلمة المرور <span class="required">*</span></label>
                    <input type="password" id="password" placeholder="أدخل كلمة المرور لتأكيد الحذف" dir="ltr" required>
                </div>

                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="checkbox" id="confirmCheckbox" required style="width: 18px; height: 18px; cursor: pointer;">
                        <span>أؤكد رغبتي بحذف حسابي وكل بياناتي بشكل <strong>نهائي</strong> <span class="required">*</span></span>
                    </label>
                </div>

                <input type="hidden" id="recaptchaToken" name="recaptcha_token">
                
                <button type="submit" class="btn-submit" id="submitBtn">
                    حذف الحساب نهائياً
                </button>
            </form>

            <div id="resultMessage" class="result"></div>

            <div class="footer">
                © 2025 تطبيق القلعة - جميع الحقوق محفوظة
                <br>
                <small>للمساعدة: <a href="mailto:support@alqalaa.com" style="color: #dc2626;">support@alqalaa.com</a> | <a href="tel:+9647888705002" style="color: #dc2626;">+9647888705002</a></small>
            </div>
        </div>
    </div>
</div>

<script>
    // 🔥 تكوين Supabase - استبدل هذه القيم
    const SUPABASE_URL = 'https://ucilwjdhxretkpbsbzym.supabase.co';
    const EDGE_FUNCTION_URL = `${SUPABASE_URL}/functions/v1/delete-account`;
    const RECAPTCHA_SITE_KEY = 'YOUR_RECAPTCHA_SITE_KEY'; // ⚠️ استبدل بمفتاح موقعك

    const form = document.getElementById('deleteForm');
    const submitBtn = document.getElementById('submitBtn');
    const resultDiv = document.getElementById('resultMessage');

    function showResult(message, type) {
        resultDiv.textContent = message;
        resultDiv.className = `result ${type}`;
        setTimeout(() => {
            resultDiv.style.display = 'none';
        }, 8000);
    }

    // الحصول على token من reCAPTCHA قبل كل إرسال
    async function getRecaptchaToken() {
        return new Promise((resolve) => {
            grecaptcha.ready(() => {
                grecaptcha.execute(RECAPTCHA_SITE_KEY, { action: 'delete_account' })
                    .then(token => resolve(token))
                    .catch(() => resolve(null));
            });
        });
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const confirmed = document.getElementById('confirmCheckbox').checked;

        if (!email || !phone || !password) {
            showResult('❌ الرجاء تعبئة جميع الحقول المطلوبة', 'error');
            return;
        }

        if (!confirmed) {
            showResult('❌ يجب تأكيد رغبتك بحذف الحساب نهائياً', 'error');
            return;
        }

        // تعطيل الزر وعرض حالة التحميل
        submitBtn.disabled = true;
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<span class="spinner"></span> جاري التحقق والمعالجة...';

        try {
            // الحصول على token من reCAPTCHA
            const recaptchaToken = await getRecaptchaToken();
            
            if (!recaptchaToken) {
                showResult('❌ فشل التحقق من reCAPTCHA. يرجى تحديث الصفحة والمحاولة مرة أخرى.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
                return;
            }

            // إرسال الطلب إلى الـ Edge Function
            const response = await fetch(EDGE_FUNCTION_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    email: email,
                    phone: phone,
                    password: password,
                    recaptcha_token: recaptchaToken
                })
            });

            const data = await response.json();

            if (response.status === 429) {
                // Rate limit exceeded
                showResult('⚠️ ' + (data.message || 'محاولات كثيرة. يرجى المحاولة بعد 30 دقيقة'), 'error');
            } else if (response.ok && data.success) {
                showResult('✅ ' + (data.message || 'تم حذف حسابك بنجاح!'), 'success');
                form.reset();
                // مسح أي بيانات جلسة
                localStorage.clear();
                // إعادة توجيه اختياري بعد 3 ثوان
                // setTimeout(() => { window.location.href = '/'; }, 3000);
            } else {
                let errorMessage = data.message || 'حدث خطأ أثناء حذف الحساب';
                if (errorMessage.includes('كلمة المرور')) {
                    errorMessage = '❌ كلمة المرور غير صحيحة';
                } else if (errorMessage.includes('المستخدم')) {
                    errorMessage = '❌ لا يوجد حساب بهذه البيانات';
                }
                showResult(errorMessage, 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showResult('❌ خطأ في الاتصال بالخادم. يرجى المحاولة لاحقاً.', 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
        }
    });
</script>
</body>
</html>
